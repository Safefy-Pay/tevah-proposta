<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Proposta — E-commerce + CRM Unificado · Tevah</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --tv-bg: #FAFAFA;
    --tv-surface: #FFFFFF;
    --tv-ink: #1D1D1F;
    --tv-ink-2: #6E6E73;
    --tv-ink-3: #86868B;
    --tv-accent: #0A0A0A;
    --tv-line: rgba(0,0,0,0.08);
    --tv-line-2: rgba(0,0,0,0.04);
    --tv-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  html, body {
    background: var(--tv-bg);
    color: var(--tv-ink);
    font-family: "Helvetica Neue", Helvetica, "Inter Tight", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .font-display { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; letter-spacing: -0.035em; font-weight: 500; }
  .font-editorial { font-family: "Times New Roman", "Times", serif; font-style: italic; letter-spacing: -0.01em; }
  .font-mono { font-family: "SF Mono", "JetBrains Mono", "Menlo", monospace; letter-spacing: 0.02em; }
  .tv-eyebrow { font-family: "SF Mono", "JetBrains Mono", "Menlo", monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--tv-ink-2); }

  .btn-primary { background: #0A0A0A; color: #fff; height: 48px; border-radius: 8px; padding: 0 22px; font-size: 14px; font-weight: 500; transition: all .3s ease; display: inline-flex; align-items: center; justify-content: center; gap: 10px; }
  .btn-primary:hover { background: #1D1D1F; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(0,0,0,.12); }
  .btn-secondary { background: transparent; color: #1D1D1F; border: 1px solid #1D1D1F; height: 48px; border-radius: 8px; padding: 0 22px; font-size: 14px; font-weight: 500; transition: all .3s ease; display: inline-flex; align-items: center; justify-content: center; gap: 10px; }
  .btn-secondary:hover { background: #1D1D1F; color: #fff; }
  .btn-ghost-light { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,.3); height: 48px; border-radius: 8px; padding: 0 22px; font-size: 14px; font-weight: 500; transition: all .3s ease; display: inline-flex; align-items: center; justify-content: center; gap: 10px; }
  .btn-ghost-light:hover { background: #fff; color: #0A0A0A; border-color: #fff; }

  .tv-rule { height: 1px; background: var(--tv-line); }
  .tv-rule-dark { height: 1px; background: rgba(255,255,255,.12); }

  .nav-glass { background: rgba(250,250,250,0.82); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); border-bottom: 1px solid var(--tv-line); }

  .badge { display: inline-flex; align-items: center; gap: 6px; height: 22px; padding: 0 9px; border-radius: 4px; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; font-family: "SF Mono", "JetBrains Mono", Menlo, monospace; }
  .badge-light { background: #fff; color: var(--tv-ink); border: 1px solid var(--tv-line); }
  .badge-dark  { background: var(--tv-ink); color: #fff; }
  .badge-emerald { background: rgba(16,185,129,.10); color: #047857; border: 1px solid rgba(16,185,129,.25); }
  .badge-amber { background: rgba(217,119,6,.10); color: #b45309; border: 1px solid rgba(217,119,6,.25); }
  .badge-rose { background: rgba(225,29,72,.08); color: #be123c; border: 1px solid rgba(225,29,72,.22); }

  .num-display { font-family: "Times New Roman", Times, serif; font-style: italic; font-weight: 400; letter-spacing: -0.04em; line-height: 0.86; }

  /* faux browser bar for screenshot preview */
  .browserbar { background: linear-gradient(180deg, #f6f6f7 0%, #efefef 100%); border-bottom: 1px solid var(--tv-line); }

  /* hide scrollbars in horizontal scrollers */
  .snap-row { scroll-snap-type: x mandatory; }
  .snap-row > * { scroll-snap-align: start; }
  .snap-row::-webkit-scrollbar { display: none; }

  /* connector line for module list */
  .timeline-track::before { content: ""; position: absolute; left: 18px; top: 0; bottom: 0; width: 1px; background: var(--tv-line); }

  /* checkbox-like check */
  .tv-check { width: 16px; height: 16px; border-radius: 50%; border: 1px solid var(--tv-line); display: inline-flex; align-items: center; justify-content: center; color: var(--tv-ink); }
  .tv-check.is-on { background: var(--tv-ink); color: #fff; border-color: var(--tv-ink); }

  /* anchored section padding */
  section[id] { scroll-margin-top: 80px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="env,react" src="components.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="proposta.jsx"></script>
  <script type="text/babel" data-presets="env,react">
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Proposta/>);
  </script>
</body>
</html>
