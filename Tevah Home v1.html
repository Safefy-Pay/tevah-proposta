<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TEVAH — Moda Masculina desde 1959</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --tv-bg: #FAFAFA;
    --tv-surface: #FFFFFF;
    --tv-ink: #1D1D1F;
    --tv-ink-2: #6E6E73;
    --tv-ink-3: #86868B;
    --tv-accent: #0A0A0A;
    --tv-line: rgba(0,0,0,0.08);
    --tv-line-2: rgba(0,0,0,0.04);
    --tv-shadow: 0 2px 8px rgba(0,0,0,0.06);
    --tv-shadow-lg: 0 12px 40px rgba(0,0,0,0.08);
  }
  html, body {
    background: var(--tv-bg);
    color: var(--tv-ink);
    font-family: "Helvetica Neue", Helvetica, "Inter Tight", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: "ss01", "cv11";
  }
  .font-display {
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    letter-spacing: -0.035em;
    font-weight: 500;
  }
  .font-editorial {
    font-family: "Times New Roman", "Times", serif;
    font-style: italic;
    letter-spacing: -0.01em;
  }
  .font-mono {
    font-family: "SF Mono", "JetBrains Mono", "Menlo", monospace;
    letter-spacing: 0.02em;
  }
  .tv-eyebrow {
    font-family: "SF Mono", "JetBrains Mono", "Menlo", monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--tv-ink-2);
  }

  /* product placeholder — clean studio look with subtle vertical fades */
  .tv-photo {
    background:
      linear-gradient(180deg, #F2F2F2 0%, #E9E9EB 60%, #E2E2E5 100%);
    position: relative;
    overflow: hidden;
  }
  .tv-photo::before {
    content: "";
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(
      90deg,
      rgba(0,0,0,0.012) 0 1px,
      transparent 1px 28px
    );
    pointer-events: none;
  }
  .tv-photo .tag {
    position: absolute;
    left: 14px; bottom: 12px;
    font-family: "SF Mono", "JetBrains Mono", Menlo, monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: #8C8C90;
    text-transform: uppercase;
  }

  /* primary button */
  .btn-primary {
    background: var(--tv-accent);
    color: #fff;
    height: 48px;
    border-radius: 8px;
    padding: 0 22px;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: -0.005em;
    transition: transform .3s ease, background .3s ease, box-shadow .3s ease;
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
  }
  .btn-primary:hover { background: #1D1D1F; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(0,0,0,.12); }

  .btn-secondary {
    background: transparent;
    color: var(--tv-ink);
    border: 1px solid var(--tv-ink);
    height: 48px;
    border-radius: 8px;
    padding: 0 22px;
    font-size: 14px;
    font-weight: 500;
    transition: all .3s ease;
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
  }
  .btn-secondary:hover { background: var(--tv-ink); color: #fff; }

  /* chip / filter */
  .tv-chip {
    border: 1px solid var(--tv-line);
    background: #fff;
    border-radius: 999px;
    height: 36px;
    padding: 0 14px;
    font-size: 13px;
    color: var(--tv-ink);
    display: inline-flex; align-items: center; gap: 8px;
    transition: all .25s ease;
  }
  .tv-chip:hover { border-color: var(--tv-ink); }
  .tv-chip.is-on { background: var(--tv-ink); color: #fff; border-color: var(--tv-ink); }

  /* underline link */
  .tv-link {
    position: relative;
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 14px;
    color: var(--tv-ink);
    padding-bottom: 4px;
  }
  .tv-link::after {
    content: "";
    position: absolute; left: 0; right: 14px; bottom: 0;
    height: 1px; background: var(--tv-ink);
    transform-origin: left;
    transition: transform .35s cubic-bezier(.2,.7,.2,1);
  }
  .tv-link:hover::after { transform: scaleX(0.7); }

  /* product card hover — second image fade */
  .product-card .img-b { opacity: 0; transition: opacity .5s ease; }
  .product-card:hover .img-b { opacity: 1; }
  .product-card:hover .img-a { opacity: 0; }
  .product-card .img-a { transition: opacity .5s ease, transform .8s ease; }
  .product-card:hover .img-a { transform: scale(1.02); }

  /* nav glass */
  .nav-glass {
    background: rgba(250,250,250,0.78);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--tv-line);
  }

  /* marquee */
  @keyframes mqr { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .marquee-track { display: flex; gap: 56px; animation: mqr 38s linear infinite; }

  /* scroll snap row */
  .snap-row { scroll-snap-type: x mandatory; }
  .snap-row > * { scroll-snap-align: start; }
  .snap-row::-webkit-scrollbar { display: none; }

  /* dotted divider */
  .tv-rule {
    height: 1px;
    background: var(--tv-line);
  }

  /* badge pill */
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    height: 22px; padding: 0 9px;
    border-radius: 4px;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-family: "SF Mono", "JetBrains Mono", Menlo, monospace;
  }
  .badge-light { background: #fff; color: var(--tv-ink); border: 1px solid var(--tv-line); }
  .badge-dark  { background: var(--tv-ink); color: #fff; }

  /* dark hero shape for consultoria */
  .consul-photo {
    background:
      radial-gradient(120% 60% at 50% 0%, #2a2a2c 0%, #161618 65%, #0c0c0e 100%);
  }

  /* reveal — kept as a no-op wrapper to avoid iframe transition-throttling bugs.
     Content is always visible; we no longer animate opacity/transform. */
  .reveal { }

  /* big editorial number */
  .heritage-num {
    font-family: "Times New Roman", Times, serif;
    font-style: italic;
    font-weight: 400;
    letter-spacing: -0.04em;
    line-height: 0.86;
  }

  /* keyboard hint */
  kbd { font-family: "SF Mono", Menlo, monospace; font-size: 11px; padding: 2px 6px; border: 1px solid var(--tv-line); border-bottom-width: 2px; border-radius: 4px; color: var(--tv-ink-2); background: #fff; }
</style>
</head>
<body>
  <div id="root"></div>

  <script>
    /* Opt into the reveal animation early so we don't flash visible → hidden → visible. */
    document.documentElement.classList.add("js-reveal");
  </script>
  <script type="text/babel" data-presets="env,react" src="components.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="sections.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="app.jsx"></script>
</body>
</html>
